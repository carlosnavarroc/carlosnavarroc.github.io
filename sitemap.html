---
layout: default
title: Sitemap
permalink: /sitemap.html
---

<h1>Sitemap</h1>

<h2>Páginas</h2>
<ul>
  {% for page in site.pages %}
    {% if page.url and page.title %}
      <li>
        <a href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
          {{ page.title }}
        </a>
      </li>
    {% endif %}
  {% endfor %}
</ul>

<h2>Posts</h2>
<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ site.url }}{{ site.baseurl }}{{ post.url }}">
        {{ post.title }}
      </a>
    </li>
  {% endfor %}
</ul>
